services:
  redis:
    image: redis:7-alpine
    container_name: soulgraph-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: soulgraph-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS=
      - CHROMA_SERVER_AUTHN_PROVIDER=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse-postgres:
    image: postgres:15-alpine
    container_name: soulgraph-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: soulgraph-langfuse
    ports:
      - "3100:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3100
      - NEXTAUTH_SECRET=soulgraph-local-secret-change-in-prod
      - SALT=soulgraph-local-salt-change-in-prod
      - TELEMETRY_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  soulgraph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soulgraph-api
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SOULGRAPH_API_HOST=0.0.0.0
      - SOULGRAPH_API_PORT=8080
      - SOULGRAPH_LOG_LEVEL=INFO
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  chroma-data:
    driver: local
  langfuse-db-data:
    driver: local
